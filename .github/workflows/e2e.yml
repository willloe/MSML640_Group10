name: e2e
on: [push, pull_request]
jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install -e ./packages/classifier -e ./packages/diffusion -e ./apps/pipeline
      - run: python -m pipeline.run_e2e
